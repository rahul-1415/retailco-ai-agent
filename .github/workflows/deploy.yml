name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff --quiet

      - name: Run ruff
        run: ruff check src/ lambda_handler.py

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt --quiet

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: dummy-key-for-tests
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing

  # ── Detect which paths changed ────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'lambda_handler.py'
              - 'tax_rate_by_category.csv'
              - 'requirements.txt'
              - 'infrastructure/template.yaml'

  # ── Build Lambda zip + validate + upload to S3 ───────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, changes]
    if: needs.changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies (manylinux wheels for Lambda)
        run: |
          pip install -r requirements.txt -t .build/ \
            --platform manylinux2014_x86_64 \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade \
            --quiet

      - name: Copy source code
        run: |
          cp lambda_handler.py .build/
          cp tax_rate_by_category.csv .build/
          cp -r src .build/src

      - name: Create Lambda zip
        run: |
          cd .build
          zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*" > /dev/null
          cd ..
          echo "Zip size: $(du -sh lambda.zip | cut -f1)"

      - name: Validate CloudFormation template
        run: aws cloudformation validate-template --template-body file://infrastructure/template.yaml

      - name: Upload Lambda zip to S3
        run: aws s3 cp lambda.zip s3://retailco-cfn-${{ secrets.AWS_ACCOUNT_ID }}/lambda.zip

  # ── Deploy to AWS (requires manual approval) ──────────────────────────────
  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    environment: production        # ← pauses here for manual approval

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name retailco-agent \
            --region us-east-1 \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
                DeploymentBucket=retailco-cfn-${{ secrets.AWS_ACCOUNT_ID }} \
                SsmParamName=/retailco/openai-api-key \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name retailco-invoice-processor \
            --s3-bucket retailco-cfn-${{ secrets.AWS_ACCOUNT_ID }} \
            --s3-key lambda.zip \
            --region us-east-1 \
            --output table \
            --query "{FunctionName:FunctionName,CodeSize:CodeSize,LastModified:LastModified}"

      - name: Print API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name retailco-agent \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
